version: 0.0
os: windows

files:
  - source: publish
    destination: C:\inetpub\wwwroot\PramodApi

hooks:
  BeforeInstall:
    - location: scripts/stop.ps1
      timeout: 300
      runas: Administrator

  ApplicationStart:
    - location: scripts/start.ps1
      timeout: 300
      runas: Administrator